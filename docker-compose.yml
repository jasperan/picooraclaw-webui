version: "3.9"

services:
  oracle:
    image: container-registry.oracle.com/database/free:latest
    container_name: picooraclaw-oracle
    environment:
      ORACLE_PWD: ${ORACLE_PWD:-oracle}
      ORACLE_CHARACTERSET: AL32UTF8
    ports:
      - "${ORACLE_PORT:-1521}:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "sh", "-c", "echo 'select 1 from dual;' | sqlplus -s system/${ORACLE_PWD:-oracle}@//localhost:1521/FREEPDB1 | grep -q '^\\s*1$$'"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s

  picooraclaw:
    image: ghcr.io/jasperan/picooraclaw:latest
    container_name: picooraclaw-core
    depends_on:
      oracle:
        condition: service_healthy
    environment:
      ORACLE_DSN: "system/${ORACLE_PWD:-oracle}@oracle:1521/FREEPDB1"
      PICOORACLAW_IPC: "/tmp/picooraclaw.sock"
    volumes:
      - picooraclaw-sock:/tmp
    restart: unless-stopped

  webui:
    build: .
    container_name: picooraclaw-webui
    depends_on:
      - picooraclaw
    environment:
      PICOORACLAW_IPC: "/tmp/picooraclaw.sock"
      PORT: "3000"
    volumes:
      - picooraclaw-sock:/tmp
    ports:
      - "${WEBUI_PORT:-3000}:3000"
    restart: unless-stopped

volumes:
  oracle-data:
  picooraclaw-sock:
